name: kudipay
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: 
  flutter_svg:
  google_fonts:
  smooth_page_indicator: 

  # State Management
  provider: 
  flutter_riverpod:

  # Forms & Validation
  form_field_validator:
  pinput: 

   # UI Components
  card_swiper:
  flutter_clean_calendar:

  # Network & API
  http:
  dio:
  
  # NEW: Internet Connectivity Packages
  connectivity_plus:                     # Monitor network connectivity
  internet_connection_checker_plus:      # Check actual internet access

  # Data & Storage
  shared_preferences:
  flutter_secure_storage:

  # Firebase
  firebase_auth:
  firebase_core:
  cloud_firestore:

  # Media & Files
  camera: 
  image_picker: 
  file_picker: 
  csv: 
  permission_handler:

  # Permissions & Contacts
  flutter_contacts:   # ← NEW: read device phonebook with phone numbers


  # Utilities
  intl:
  flutter_lints: 
  crypto: 
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_launcher_icons: 

flutter_icons: 
  android: true
  ios: true
  image_path: "assets/images/kudikit_teal_logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icons/kudikit_android_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Poly Sans
      fonts:
        - asset: assets/fonts/Polysanstrial-neutral.otf