name: kudipay
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: 
  flutter_svg:
  google_fonts:
  smooth_page_indicator: 

  # State Management
  provider: 
  flutter_riverpod:

  # Forms & Validation
  form_field_validator:
  pinput: 

  # UI Components
  flutter_swiper_null_safety_flutter3:
  flutter_clean_calendar:

  # Network & API
  http:
  dio:
  
  # NEW: Internet Connectivity Packages
  connectivity_plus:                     # Monitor network connectivity
  internet_connection_checker_plus:      # Check actual internet access

  # Data & Storage
  shared_preferences:
  flutter_secure_storage:

  # Firebase
  firebase_auth:
  firebase_core:
  cloud_firestore:

  # Media & Files
  camera: 
  image_picker: 
  file_picker: 
  csv: 
  permission_handler:

  # Utilities
  intl:
  flutter_lints: 
  crypto: 

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf