name: kudipay
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.2
  flutter_svg:
  google_fonts:
  smooth_page_indicator: ^1.1.0

  # State Management
  provider: ^6.1.5+1
  flutter_riverpod:

  # Forms & Validation
  form_field_validator:
  pinput: ^5.0.0

  # UI Components
  flutter_swiper_null_safety_flutter3:
  flutter_clean_calendar:

  # Network & API
  http:
  dio:
  
  # NEW: Internet Connectivity Packages
  connectivity_plus:                     # Monitor network connectivity
  internet_connection_checker_plus:      # Check actual internet access

  # Data & Storage
  shared_preferences:
  flutter_secure_storage:

  # Firebase
  firebase_auth:
  firebase_core:
  cloud_firestore:

  # Media & Files
  camera: ^0.10.5+5
  image_picker: ^1.0.7
  file_picker:
  permission_handler:

  # Utilities
  intl:
  flutter_lints: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf