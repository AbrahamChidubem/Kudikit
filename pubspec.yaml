name: kudipay
description: "KudiPay — Nigerian fintech mobile application."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons:
  flutter_svg:
  google_fonts:
  smooth_page_indicator:

  # State Management
  flutter_riverpod:

  # Forms & Validation
  form_field_validator:
  pinput:

  # UI Components
  card_swiper:
  flutter_clean_calendar:

  # Network & API
  dio:
  # http kept for add_money_services which uses it directly
  http:

  # Connectivity
  connectivity_plus:
  internet_connection_checker_plus:

  # Data & Storage
  shared_preferences:
  flutter_secure_storage:

  # Firebase (initialise in main() before going live)
  firebase_auth:
  firebase_core:
  cloud_firestore:

  # Media & Files
  camera:
  image_picker:
  file_picker:
  csv:
  permission_handler:
  flutter_contacts:

  # Utilities
  intl:
  crypto:
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Kudikit_teal_logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icons/kudikit_android_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/icons/

  fonts:
    # FIXED: All PolySans weight variants registered.
    # Previously only neutral.otf was registered — bold/semibold text
    # was silently falling back to the single face.
    - family: PolySans
      fonts:
        - asset: assets/fonts/polysanstrial-slim.otf
          weight: 300
        - asset: assets/fonts/polysanstrial-neutral.otf
          weight: 400
        - asset: assets/fonts/polysanstrial-median.otf
          weight: 500
        - asset: assets/fonts/polysanstrial-median.otf
          weight: 600
        - asset: assets/fonts/polysanstrial-bulky.otf
          weight: 700
        - asset: assets/fonts/polysanstrial-bulky.otf
          weight: 800
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Light.ttf
          weight: 300
        - asset: assets/fonts/OpenSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/OpenSans-Semibold.ttf
          weight: 600
        - asset: assets/fonts/OpenSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/OpenSans-ExtraBold.ttf
          weight: 800